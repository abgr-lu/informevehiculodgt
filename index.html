<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Informe Vehículo DGT</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://js.stripe.com/v3/"></script>
<style>
body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
header { background: #003366; color: white; padding: 40px; text-align: center; }
header h1 { margin: 0; font-size: 28px; }
header p { margin-top: 10px; font-size: 18px; color: #ffdd57; font-weight: bold; }
.container { max-width: 1000px; margin: 20px auto; background: white; padding: 40px; display: flex; justify-content: space-around; flex-wrap: wrap; }
.pricebox { border: 1px solid #ddd; padding: 20px; text-align: center; width: 45%; margin-bottom: 20px; border-radius: 12px; background: #fefefe; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
.pricebox b { font-size: 22px; }
button.pay { 
  background: #2ecc71; 
  color: white; 
  border: none; 
  padding: 15px 20px; 
  font-size: 18px; 
  cursor: pointer; 
  margin-top: 15px; 
  border-radius: 8px; 
  width: 100%;
  transition: background 0.3s;
}
button.pay:hover { background: #27ae60; }
.notice { margin-top: 30px; font-size: 16px; color: #333; text-align: center; font-weight: bold; }
@media (max-width: 700px) {
  .container { flex-direction: column; align-items: center; }
  .pricebox { width: 90%; }
}
</style>
</head>
<body>

<header>
<h1>Informe Vehículo DGT</h1>
<p>Evita sorpresas al comprar un vehículo de segunda mano</p>
</header>

<div class="container">
<div class="pricebox">
  <b>Informe Vehículo Rápido</b><br>Entrega en pocas horas<br><b>25 €</b><br>
  <button class="pay" id="rapidBtn">Solicitar Informe</button>
</div>

<div class="pricebox">
  <b>Informe Vehículo Urgente</b><br>Entrega inmediata<br><b>29 €</b><br>
  <button class="pay" id="urgentBtn">Solicitar Informe</button>
</div>
</div>

<p class="notice">Tras realizar el pago, se le redirigirá a un formulario para introducir matrícula y email y recibir su informe.</p>

<script>
const stripe = Stripe("pk_live_51TAWrbFVjMJ87hr1dFLrxlNpGW4fRd8hZfsp5ZT5ReIeP2TjhvI7BA0MVQGDhH9sR8kBWfoVuKVVNjcotIVSmcaq00lIHH3gbh");

// Price IDs live
const priceRapid = "price_1TAYB5FVjMJ87hr1xrmRXUdE";
const priceUrgent = "price_1TAYB3FVjMJ87hr1OvFGwWN0";

document.getElementById("rapidBtn").addEventListener("click", () => {
  stripe.redirectToCheckout({
    lineItems: [{ price: priceRapid, quantity: 1 }],
    mode: 'payment',
    successUrl: window.location.origin + '/formulario.html',
    cancelUrl: window.location.origin
  });
});

document.getElementById("urgentBtn").addEventListener("click", () => {
  stripe.redirectToCheckout({
    lineItems: [{ price: priceUrgent, quantity: 1 }],
    mode: 'payment',
    successUrl: window.location.origin + '/formulario.html',
    cancelUrl: window.location.origin
  });
});
</script>

</body>
</html>
