<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informe completo de Motos | InformeVehículoDGT</title>

<style>
*{box-sizing:border-box;}
body{font-family:Arial,sans-serif;margin:0;background:#f4f4f4;color:#333;}
header{background:#003366;color:#fff;padding:30px;text-align:center;}
.container{max-width:1000px;margin:auto;padding:20px;background:#fff;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,0.1);}
h2,h3{text-align:center;color:#003366;}
.form-card{border:3px solid #003366;border-radius:10px;padding:30px;text-align:center;width:350px;margin:30px auto;box-shadow:0 0 15px rgba(0,51,102,0.2);}
.form-card input{width:100%;padding:12px;margin-bottom:20px;border-radius:6px;border:1px solid #003366;text-align:center;}
.old-price{text-decoration:line-through;color:#999;}
.price{font-size:2em;color:#003366;font-weight:bold;}
.button{background:#ff6600;color:#fff;padding:16px;border:none;border-radius:8px;font-weight:bold;width:100%;cursor:pointer;}
.microcopy{font-size:14px;margin-top:10px;}
</style>

<script>
const stripeURL="https://buy.stripe.com/fZubJ1ftv6IR3Qt6WigrS02";
function goToStripe(){
let m=document.getElementById("matricula").value;
let e=document.getElementById("email").value;
if(!m||!e){alert("Introduce matrícula y email");return;}
window.location.href=stripeURL+"?prefilled_email="+e+"&client_reference_id="+m+"&locale=es";
}
</script>
</head>

<body>

<header>
<h1>Informe completo de Motos</h1>
<p>Consulta el historial antes de comprar tu moto</p>
</header>

<div class="container">

<div class="form-card">
<h3>Introduce matrícula y correo electrónico</h3>

<input type="text" id="matricula" placeholder="Matrícula de la moto">
<input type="email" id="email" placeholder="Correo electrónico">

<p><span class="old-price">39,99 €</span> <span class="price">24,99 €</span></p>
<p><strong>Entrega inmediata</strong></p>

<button class="button" onclick="goToStripe()">🚀 Obtener informe</button>

<p class="microcopy">🔒 Pago seguro • 📄 Informe oficial DGT</p>
</div>

</div>
</body>
</html>
