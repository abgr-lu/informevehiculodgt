<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gracias por tu compra – Informe de Vehículo DGT</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Gracias por pagar. Completa tu solicitud del informe de vehículo DGT con tu matrícula y correo.">
<style>
body {font-family: Arial, sans-serif; margin:0; background:#f5f5f5;}
header {background:#003366; color:white; padding:50px 20px; text-align:center;}
header h1 {margin:0; font-size:2em;}
header p {margin-top:10px; font-size:1.2em;}
.container {max-width:600px; margin:20px auto; padding:20px; background:white; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
button {background:#2ecc71; color:white; border:none; padding:15px; font-size:16px; cursor:pointer; width:100%; margin-top:10px; border-radius:5px;}
input {width:100%; padding:10px; margin:10px 0 20px 0;}
label {display:block; margin-top:10px;}
</style>
</head>
<body>

<header>
<h1>¡Gracias por tu pago!</h1>
<p>Completa tus datos para recibir tu informe</p>
</header>

<div class="container">
<form action="https://formspree.io/f/xojkwgvv" method="POST">
<label>Matrícula</label>
<input type="text" name="matricula" required>

<label>Email</label>
<input type="email" name="email" required>

<input type="hidden" name="tipo" value="Informe comprado">

<button type="submit">Enviar solicitud</button>
</form>
<p style="font-size:13px; color:#555; margin-top:20px;">
Una vez enviado el formulario, recibirás tu informe de forma segura en el correo proporcionado.
</p>
</div>

</body>
</html>
